services:
  - type: web
    name: rocketloom-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3000
      - key: WHATSAPP_NUMBER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_MODEL
        sync: false
